[tool.ruff]
line-length = 100
target-version = "py310"   # matches CI matrix lowest supported version
extend-exclude = ["data", "venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC", "SIM"]
ignore = [
    "E501",  # line-length is handled by the formatter
    "B008",  # FastAPI uses Depends() / Form() in defaults — that's fine
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # allow `assert False` in tests

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
