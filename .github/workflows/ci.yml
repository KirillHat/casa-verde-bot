name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install scanner
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets
      - name: Scan tracked source files
        run: |
          python - <<'PY'
          import json
          import subprocess

          files = subprocess.check_output(
              ["git", "ls-files", "*.py", "*.toml", "*.yml", "*.yaml", "*.ini", "*.sh", "Dockerfile"],
              text=True,
          ).splitlines()
          if not files:
              print("No files to scan.")
              raise SystemExit(0)

          proc = subprocess.run(
              ["detect-secrets", "scan", *files],
              check=True,
              capture_output=True,
              text=True,
          )
          data = json.loads(proc.stdout)
          findings = data.get("results", {})
          if findings:
              print(json.dumps(findings, indent=2))
              raise SystemExit(1)
          print("detect-secrets: clean")
          PY

  test:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term -q

      - name: Upload coverage to Codecov
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  smoke:
    name: runtime smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Start app and run smoke checks
        env:
          TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
          TWILIO_AUTH_TOKEN: test_token
          ANTHROPIC_API_KEY: test_key
          DEBUG_SKIP_TWILIO_SIGNATURE: "true"
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8090 > /tmp/wa.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8090/healthz >/tmp/wa_health.json; then
              break
            fi
            sleep 1
          done
          test "$(curl -s -o /tmp/wa_health2.json -w '%{http_code}' http://127.0.0.1:8090/healthz)" = "200"
          test "$(curl -s -o /tmp/wa_hook.xml -w '%{http_code}' -X POST \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'From=whatsapp:+15551234567' \
            --data-urlencode 'Body=Hi' \
            --data-urlencode 'ProfileName=Test User' \
            --data-urlencode 'WaId=15551234567' \
            http://127.0.0.1:8090/webhooks/whatsapp)" = "200"
          grep -q "<Response/>" /tmp/wa_hook.xml

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.7.1
      - run: ruff check .
      - run: ruff format --check .
